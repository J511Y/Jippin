# =============================================================================
# Jippin — nginx 단일 진입점 (CEO §1.2, CMP-530 산출물 #1 옵션 서비스)
# -----------------------------------------------------------------------------
# 상태: STUB. 기본 `make up` 에서는 활성화되지 않으며 `make up-edge` (또는
# `docker compose --profile edge up`) 로만 기동된다. 실제 도메인/TLS 설정은
# CMP-524 의 reverse-proxy 결정 후 후속 이슈에서 보강한다.
#
# 라우팅:
#   /api/*  → http://api:8000   (FastAPI)
#   /*      → http://web:3000   (Next.js, 정적·SSR 포함)
# =============================================================================

upstream jippin_web {
  server web:3000;
}

upstream jippin_api {
  server api:8000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 16m;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;

  location /api/ {
    proxy_pass         http://jippin_api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location /healthz {
    proxy_pass         http://jippin_api/healthz;
    proxy_set_header   Host              $host;
  }

  location / {
    proxy_pass         http://jippin_web;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
