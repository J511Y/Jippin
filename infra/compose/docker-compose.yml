# =============================================================================
# Jippin — 단일 인스턴스 오케스트레이션 (CMP-530 / CEO 브리프 §2 D2)
# -----------------------------------------------------------------------------
# 봉인:
#   - 단일 호스트 1대 가정. k8s/ECS 매니페스트 금지.
#   - Postgres 컨테이너 금지 — Neon (DATABASE_URL / DATABASE_POOL_URL) 직결.
#   - 모델 가중치/대용량 바이너리는 이미지에 포함하지 않는다.
#   - 시크릿은 infra/compose/.env (로컬, .gitignore 차단). 자리표시자는 .env.example.
#
# 부팅:
#   make up                 # foreground, override.example.yml 이 cp 되어 있으면 자동 머지
#   docker compose -f infra/compose/docker-compose.yml up --build
#
# 참조: ADR-0001 §5 (컨테이너 런타임), §9 (이미지 봉인) / AGENTS.md §4.4 (env)
# =============================================================================

name: jippin

services:
  # ---------------------------------------------------------------------------
  # web — Next.js 16.2 LTS BFF. /healthz 200 자가 헬스체크 (Dockerfile 참조).
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    image: jippin-web:local
    container_name: jippin-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      # BFF → API 의 server-to-server 호출은 컨테이너 네트워크 이름으로 경유한다.
      NEXT_PUBLIC_API_BASE_URL: "http://api:8000"
      # OAuth 진입 BFF (`/auth/oauth/start`) 가 302 `Location` 으로 사용자 브라우저를
      # 보내는 경로는 browser-reachable 한 URL 이어야 한다 — CMP-584 round-3/4 봉인.
      # 호스트 머신에서 `docker compose up` 으로 띄울 때 브라우저는 `localhost:8000` 으로
      # api 서비스에 도달 가능 (ports: 8000:8000). compose 외 환경에서는 이 값을 외부
      # 도달 가능한 public URL (예: https://api.jippin.com) 으로 치환.
      API_PUBLIC_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jippin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # migrate — Alembic 사이드카 (CMP-537 / parent: CMP-536).
  # api 가 기동되기 전 한 번 실행되고 service_completed_successfully 로 종료된다.
  # ENTRYPOINT 와 분리해 multi-replica 경합/롤백 어려움을 피한다 (CTO ADR).
  # ---------------------------------------------------------------------------
  migrate:
    image: jippin-api:local
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: jippin-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      # Alembic 은 non-pooler URL 에서만 동작한다 (DDL/Prepared-statement 호환성).
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set (Neon non-pooler)}"
      PYTHONUNBUFFERED: "1"
    restart: "no"
    networks:
      - jippin

  # ---------------------------------------------------------------------------
  # api — FastAPI 백엔드. Neon (non-pooler + pooler) 직결.
  # 컨테이너 내부에서 /healthz 가 SELECT 1 으로 Neon 응답을 확인하는 것을 가정.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    image: jippin-api:local
    container_name: jippin-api
    restart: unless-stopped
    environment:
      # Neon — 두 호스트 모두 부재 시 부팅 차단 (`:?` 가드).
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set (Neon non-pooler)}"
      DATABASE_POOL_URL: "${DATABASE_POOL_URL:?DATABASE_POOL_URL must be set (Neon pgbouncer pooler)}"
      # Redis — 컨테이너 네트워크 이름으로 경유.
      REDIS_URL: "redis://redis:6379/0"
      # 런타임 설정.
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      HOST: "0.0.0.0"
      # ---------------------------------------------------------------------
      # AUTH (CMP-557 / CMP-558 / ADR-0003).
      # 정본·해설은 apps/api/.env.example AUTH 절. 자리표시자는
      # infra/compose/.env.example. 본 절은 host .env → 컨테이너 전달면.
      # 변수 누락 시 FastAPI 부팅 단계에서 차단되도록 후속 트랙 B 모델 PR
      # 의 config 가드에 동일 키를 등록한다.
      # ---------------------------------------------------------------------
      KAKAO_REST_API_KEY: "${KAKAO_REST_API_KEY:-}"
      KAKAO_CLIENT_SECRET: "${KAKAO_CLIENT_SECRET:-}"
      KAKAO_REDIRECT_URI: "${KAKAO_REDIRECT_URI:-}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI:-}"
      NAVER_OAUTH_CLIENT_ID: "${NAVER_OAUTH_CLIENT_ID:-}"
      NAVER_OAUTH_CLIENT_SECRET: "${NAVER_OAUTH_CLIENT_SECRET:-}"
      NAVER_OAUTH_REDIRECT_URI: "${NAVER_OAUTH_REDIRECT_URI:-}"
      OAUTH_STATE_REDIS_URL: "${OAUTH_STATE_REDIS_URL:-redis://redis:6379/1}"
      OAUTH_STATE_TTL_SECONDS: "${OAUTH_STATE_TTL_SECONDS:-600}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET:-}"
      AUTH_JWT_ALG: "${AUTH_JWT_ALG:-HS256}"
      AUTH_JWT_ACCESS_TTL_SECONDS: "${AUTH_JWT_ACCESS_TTL_SECONDS:-3600}"
      AUTH_JWT_REFRESH_TTL_SECONDS: "${AUTH_JWT_REFRESH_TTL_SECONDS:-604800}"
      ANON_SESSION_HEADER: "${ANON_SESSION_HEADER:-x-jippin-anon-id}"
      ANON_SESSION_TTL_DAYS: "${ANON_SESSION_TTL_DAYS:-30}"
      FRONTEND_AUTH_SUCCESS_URL: "${FRONTEND_AUTH_SUCCESS_URL:-http://localhost:3000/auth/success}"
      FRONTEND_AUTH_FAILURE_URL: "${FRONTEND_AUTH_FAILURE_URL:-http://localhost:3000/auth/failure}"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - jippin
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)\""
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ---------------------------------------------------------------------------
  # redis — 큐/세션/A2UI 상태 저장. 영속 볼륨으로 컨테이너 재기동에 견딘다.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jippin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - jippin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # nginx — CEO §1.2 단일 진입점 (선택). 기본 `up` 에서는 활성화되지 않으며,
  # `--profile edge` 또는 `make up-edge` 로만 기동된다 (스텁 단계).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: jippin-edge
    restart: unless-stopped
    profiles: ["edge"]
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - jippin

networks:
  jippin:
    name: jippin
    driver: bridge

volumes:
  redis-data:
    name: jippin-redis-data
