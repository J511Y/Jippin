# =============================================================================
# Jippin — 단일 인스턴스 오케스트레이션 (CMP-530 / CEO 브리프 §2 D2)
# -----------------------------------------------------------------------------
# 봉인:
#   - 단일 호스트 1대 가정. k8s/ECS 매니페스트 금지.
#   - Postgres 컨테이너 금지 — 외부 managed Postgres (Supabase)
#     의 DATABASE_URL / DATABASE_POOL_URL 직결. 현 SSOT 는 Supabase (ADR-0004 Proposed).
#   - 모델 가중치/대용량 바이너리는 이미지에 포함하지 않는다.
#   - 시크릿은 infra/compose/.env (로컬, .gitignore 차단). 자리표시자는 .env.example.
#
# 부팅:
#   make up                 # foreground, override.example.yml 이 cp 되어 있으면 자동 머지
#   docker compose -f infra/compose/docker-compose.yml up --build
#
# 참조: ADR-0001 §5 (컨테이너 런타임), §9 (이미지 봉인) / ADR-0004 (Supabase 전환)
#       AGENTS.md §4.4 (env), §5.9 (Supabase Integration migration ownership)
# =============================================================================

name: jippin

services:
  # ---------------------------------------------------------------------------
  # web — Next.js 16.2 LTS BFF. /healthz 200 자가 헬스체크 (Dockerfile 참조).
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* 와 rewrite target 은 next build 시점에 client bundle /
      # manifest 에 bake 되므로 builder stage 에 build-arg 로 주입한다.
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-/api}"
        API_INTERNAL_BASE_URL: "${API_INTERNAL_BASE_URL:-http://api:8000}"
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:?NEXT_PUBLIC_SUPABASE_URL must be set}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?NEXT_PUBLIC_SUPABASE_ANON_KEY must be set}"
    image: jippin-web:local
    container_name: jippin-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      # Browser → API calls stay same-origin so jippin_session remains scoped
      # to the web host; Next rewrites /api/* to API_INTERNAL_BASE_URL.
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-/api}"
      # Route Handlers / rewrites → API use the compose service name.
      API_INTERNAL_BASE_URL: "${API_INTERNAL_BASE_URL:-http://api:8000}"
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:?NEXT_PUBLIC_SUPABASE_URL must be set}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?NEXT_PUBLIC_SUPABASE_ANON_KEY must be set}"
      SUPABASE_FLOW_COOKIE_SECRET: "${SUPABASE_FLOW_COOKIE_SECRET:?SUPABASE_FLOW_COOKIE_SECRET must be set}"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jippin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # api — FastAPI 백엔드. 외부 managed Postgres (Supabase)
  # 의 non-pooler + pooler 두 URL 에 직결.
  # 컨테이너 내부에서 /healthz 가 SELECT 1 으로 DB 응답을 확인.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    image: jippin-api:local
    container_name: jippin-api
    restart: unless-stopped
    environment:
      # 외부 DB — 두 호스트 모두 부재 시 부팅 차단 (`:?` 가드).
      # Supabase: direct port 5432 (non-pooler) + pooler port 6543.
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set (non-pooler / direct port)}"
      DATABASE_POOL_URL: "${DATABASE_POOL_URL:?DATABASE_POOL_URL must be set (pooler)}"
      # Redis — 컨테이너 네트워크 이름으로 경유.
      REDIS_URL: "redis://redis:6379/0"
      # 런타임 설정.
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      HOST: "0.0.0.0"
      # ---------------------------------------------------------------------
      # AUTH (CMP-557 / CMP-558 / ADR-0003 + ADR-0004 §2.5 Naver fallback).
      # Auth SSOT 는 위의 Supabase 절 (NEXT_PUBLIC_SUPABASE_*, SUPABASE_JWT_SECRET).
      # 본 OAuth state / FRONTEND_AUTH_*_URL 변수들은 Naver Custom OAuth PoC
      # 결과 미확정 동안 한시적으로 보존된다 (ADR-0004 §2.3 / CMP-595).
      # 정본·해설은 apps/api/.env.example AUTH 절. 자리표시자는
      # infra/compose/.env.example. 본 절은 host .env → 컨테이너 전달면.
      # ---------------------------------------------------------------------
      KAKAO_REST_API_KEY: "${KAKAO_REST_API_KEY:-}"
      KAKAO_CLIENT_SECRET: "${KAKAO_CLIENT_SECRET:-}"
      KAKAO_REDIRECT_URI: "${KAKAO_REDIRECT_URI:-}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI:-}"
      NAVER_OAUTH_CLIENT_ID: "${NAVER_OAUTH_CLIENT_ID:-}"
      NAVER_OAUTH_CLIENT_SECRET: "${NAVER_OAUTH_CLIENT_SECRET:-}"
      NAVER_OAUTH_REDIRECT_URI: "${NAVER_OAUTH_REDIRECT_URI:-}"
      OAUTH_STATE_REDIS_URL: "${OAUTH_STATE_REDIS_URL:-redis://redis:6379/1}"
      OAUTH_STATE_TTL_SECONDS: "${OAUTH_STATE_TTL_SECONDS:-600}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET:-}"
      AUTH_JWT_ALG: "${AUTH_JWT_ALG:-HS256}"
      AUTH_JWT_ACCESS_TTL_SECONDS: "${AUTH_JWT_ACCESS_TTL_SECONDS:-3600}"
      AUTH_JWT_REFRESH_TTL_SECONDS: "${AUTH_JWT_REFRESH_TTL_SECONDS:-604800}"
      SUPABASE_JWKS_URL: "${SUPABASE_JWKS_URL:?SUPABASE_JWKS_URL must be set}"
      SUPABASE_JWT_ISSUER: "${SUPABASE_JWT_ISSUER:?SUPABASE_JWT_ISSUER must be set}"
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET must be set}"
      SUPABASE_JWT_AUDIENCE: "${SUPABASE_JWT_AUDIENCE:-authenticated}"
      FRONTEND_AUTH_SUCCESS_URL: "${FRONTEND_AUTH_SUCCESS_URL:-http://localhost:3000/auth/success}"
      FRONTEND_AUTH_FAILURE_URL: "${FRONTEND_AUTH_FAILURE_URL:-http://localhost:3000/auth/failure}"
      FRONTEND_AUTH_TERMS_URL: "${FRONTEND_AUTH_TERMS_URL:-http://localhost:3000/auth/terms}"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jippin
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)\""
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ---------------------------------------------------------------------------
  # redis — 큐/세션/A2UI 상태 저장. 영속 볼륨으로 컨테이너 재기동에 견딘다.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jippin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - jippin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # nginx — CEO §1.2 단일 진입점 (선택). 기본 `up` 에서는 활성화되지 않으며,
  # `--profile edge` 또는 `make up-edge` 로만 기동된다 (스텁 단계).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: jippin-edge
    restart: unless-stopped
    profiles: ["edge"]
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - jippin

networks:
  jippin:
    name: jippin
    driver: bridge

volumes:
  redis-data:
    name: jippin-redis-data
