# =============================================================================
# Jippin — 단일 인스턴스 오케스트레이션 (CMP-530 / CEO 브리프 §2 D2)
# -----------------------------------------------------------------------------
# 봉인:
#   - 단일 호스트 1대 가정. k8s/ECS 매니페스트 금지.
#   - Postgres 컨테이너 금지 — Neon (DATABASE_URL / DATABASE_POOL_URL) 직결.
#   - 모델 가중치/대용량 바이너리는 이미지에 포함하지 않는다.
#   - 시크릿은 infra/compose/.env (로컬, .gitignore 차단). 자리표시자는 .env.example.
#
# 부팅:
#   make up                 # foreground, override.example.yml 이 cp 되어 있으면 자동 머지
#   docker compose -f infra/compose/docker-compose.yml up --build
#
# 참조: ADR-0001 §5 (컨테이너 런타임), §9 (이미지 봉인) / AGENTS.md §4.4 (env)
# =============================================================================

name: jippin

services:
  # ---------------------------------------------------------------------------
  # web — Next.js 16.2 LTS BFF. /healthz 200 자가 헬스체크 (Dockerfile 참조).
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    image: jippin-web:local
    container_name: jippin-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      # BFF → API 호출은 컨테이너 네트워크 이름으로 경유한다.
      NEXT_PUBLIC_API_BASE_URL: "http://api:8000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jippin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # api — FastAPI 백엔드. Neon (non-pooler + pooler) 직결.
  # 컨테이너 내부에서 /healthz 가 SELECT 1 으로 Neon 응답을 확인하는 것을 가정.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    image: jippin-api:local
    container_name: jippin-api
    restart: unless-stopped
    environment:
      # Neon — 두 호스트 모두 부재 시 부팅 차단 (`:?` 가드).
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set (Neon non-pooler)}"
      DATABASE_POOL_URL: "${DATABASE_POOL_URL:?DATABASE_POOL_URL must be set (Neon pgbouncer pooler)}"
      # Redis — 컨테이너 네트워크 이름으로 경유.
      REDIS_URL: "redis://redis:6379/0"
      # 런타임 설정.
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      HOST: "0.0.0.0"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jippin
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)\""
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ---------------------------------------------------------------------------
  # redis — 큐/세션/A2UI 상태 저장. 영속 볼륨으로 컨테이너 재기동에 견딘다.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jippin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - jippin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # nginx — CEO §1.2 단일 진입점 (선택). 기본 `up` 에서는 활성화되지 않으며,
  # `--profile edge` 또는 `make up-edge` 로만 기동된다 (스텁 단계).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: jippin-edge
    restart: unless-stopped
    profiles: ["edge"]
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - jippin

networks:
  jippin:
    name: jippin
    driver: bridge

volumes:
  redis-data:
    name: jippin-redis-data
