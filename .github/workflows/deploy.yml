# 집핀(Jippin) 배포 파이프라인 - CMP-539
#
# GitHub branch 와 Neon branch 를 명시적으로 맞춘다.
#   - dev  -> APP_ENV=development -> Neon development branch
#   - main -> APP_ENV=production  -> Neon production branch
#
# 실제 클라우드 배포 대상(Vercel/Fly/Cloud Run/Lightsail 등)은 아직 스텁이며,
# release-migrate 가 성공한 뒤에만 deploy 단계로 넘어간다.
name: deploy

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch: {}

# 같은 대상 브랜치 배포가 연속 들어오면 순서가 꼬이지 않도록 직렬화한다.
# 마이그레이션 도중 취소는 위험하므로 cancel-in-progress 는 false 로 둔다.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.5.11"

jobs:
  build:
    name: build (api smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Detect apps/api
        id: detect
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ -f apps/api/pyproject.toml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api/pyproject.toml 없음 - build 잡은 no-op."
          fi

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv ${{ env.UV_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            apps/api/uv.lock
            apps/api/pyproject.toml

      - name: uv sync
        if: steps.detect.outputs.exists == 'true'
        shell: bash
        run: |
          if [[ -f uv.lock ]]; then
            uv sync --frozen
          else
            uv sync
          fi

  release-migrate:
    name: release migrate (${{ github.ref_name }})
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect target environment and secret
        id: detect
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          NEON_DEV_DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
          NEON_PROD_DATABASE_URL: ${{ secrets.NEON_PROD_DATABASE_URL }}
        run: |
          set -euo pipefail

          case "${GITHUB_REF_NAME}" in
            dev)
              target_env="development"
              secret_name="NEON_DEV_DATABASE_URL"
              has_secret="$([[ -n "${NEON_DEV_DATABASE_URL:-}" ]] && echo true || echo false)"
              ;;
            main)
              target_env="production"
              secret_name="NEON_PROD_DATABASE_URL"
              has_secret="$([[ -n "${NEON_PROD_DATABASE_URL:-}" ]] && echo true || echo false)"
              ;;
            *)
              echo "::error::Unsupported deploy branch: ${GITHUB_REF_NAME}. Only dev and main are deployable."
              exit 1
              ;;
          esac

          has_alembic="false"
          if [[ -f apps/api/alembic.ini ]]; then
            has_alembic="true"
          fi

          echo "target_env=${target_env}" >> "$GITHUB_OUTPUT"
          echo "secret_name=${secret_name}" >> "$GITHUB_OUTPUT"
          echo "has_secret=${has_secret}" >> "$GITHUB_OUTPUT"
          echo "has_alembic=${has_alembic}" >> "$GITHUB_OUTPUT"

          if [[ "${has_alembic}" != "true" ]]; then
            echo "::notice::apps/api/alembic.ini 미존재 - release-migrate 는 no-op."
          fi
          if [[ "${has_alembic}" == "true" && "${has_secret}" != "true" ]]; then
            echo "::warning::${secret_name} 시크릿이 설정되지 않았다. ${target_env} release-migrate 를 no-op 처리한다."
          fi

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: steps.detect.outputs.has_alembic == 'true' && steps.detect.outputs.has_secret == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv ${{ env.UV_VERSION }}
        if: steps.detect.outputs.has_alembic == 'true' && steps.detect.outputs.has_secret == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            apps/api/uv.lock
            apps/api/pyproject.toml

      - name: uv sync
        if: steps.detect.outputs.has_alembic == 'true' && steps.detect.outputs.has_secret == 'true'
        shell: bash
        run: |
          if [[ -f uv.lock ]]; then
            uv sync --frozen
          else
            uv sync
          fi

      - name: alembic upgrade head (development)
        if: steps.detect.outputs.target_env == 'development' && steps.detect.outputs.has_alembic == 'true' && steps.detect.outputs.has_secret == 'true'
        env:
          APP_ENV: development
          DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
        run: uv run alembic upgrade head

      - name: alembic upgrade head (production)
        if: steps.detect.outputs.target_env == 'production' && steps.detect.outputs.has_alembic == 'true' && steps.detect.outputs.has_secret == 'true'
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.NEON_PROD_DATABASE_URL }}
        run: uv run alembic upgrade head

  deploy:
    name: deploy stub (${{ github.ref_name }})
    needs: release-migrate
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Wire real deploy target later
        run: |
          if [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "TODO: deploy development target after release-migrate succeeds."
          else
            echo "TODO: deploy production target after release-migrate succeeds."
          fi
