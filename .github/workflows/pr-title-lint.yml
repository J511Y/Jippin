# 집핀(Jippin) PR 제목 검증 — CMP-531 / D5
#
# 책임:
#   PR 제목의 첫 글자가 gitmoji prefix 정규식과 호환되는지 검증한다 — 즉 PR 을
#   squash 머지했을 때 그대로 commit subject 가 되어 `gitmoji-validate` 를 통과할
#   수 있는 형식인지 본다.
#   (^(✨|🐛|📝|♻️|✅|🔧|🚀|🔒|🚧|🔖) (feat|fix|docs|refactor|test|chore|perf|security|wip|release)\(([a-z0-9][a-z0-9-]*)\): .+)
#
#   ※ `CMP-<숫자>` 이슈 식별자 요구는 CMP-DIRECT 로 제거했다 — Paperclip 보드 운용을
#      중단해 PR 제목에 이슈 태그를 강제할 이유가 없어졌다.
#
# 실패 예:
#   "kakao callback"                       → 이모지/prefix/scope 없음
#   "feat(auth): kakao callback"           → 이모지 누락
#   "✨ feature(auth): 카카오 콜백"         → prefix 화이트리스트 위반
#
# 통과 예:
#   "✨ feat(auth): 카카오 콜백"
#   "🔧 chore(ci): CI 스켈레톤 추가"
#   "🔖 release(main): dev→main 승급 v1.2.0"
#
# 본 job 은 push/머지 후가 아니라 PR 이벤트에만 동작한다 (제목 검증의 본질).
name: pr-title-lint

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-title-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: PR title (gitmoji)
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          set -euo pipefail

          title="${PR_TITLE}"
          echo "PR title: ${title}"

          fail=0

          # gitmoji + prefix(scope): 본문 — Python 으로 정규식 검증 (bash 의 [[=~]] 는 유니코드 클래스 제한).
          python3 - "${title}" <<'PY' || fail=1
          import re
          import sys

          title = sys.argv[1]
          pattern = re.compile(
              r"^(✨|🐛|📝|♻️|✅|🔧|🚀|🔒|🚧|🔖) "
              r"(feat|fix|docs|refactor|test|chore|perf|security|wip|release)"
              r"\(([a-z0-9][a-z0-9-]*)\): .+"
          )
          if not pattern.match(title):
              print("::error::PR 제목이 gitmoji 정규식과 일치하지 않습니다 (docs/CONTRIBUTING.md §2.1).", file=sys.stderr)
              print("::error::허용 이모지: ✨ 🐛 📝 ♻️ ✅ 🔧 🚀 🔒 🚧 🔖", file=sys.stderr)
              print("::error::허용 prefix: feat fix docs refactor test chore perf security wip release", file=sys.stderr)
              print("::error::예) '🔧 chore(ci): CI 스켈레톤 추가'", file=sys.stderr)
              sys.exit(1)
          PY

          if [[ "${fail}" -ne 0 ]]; then
            exit 1
          fi
          echo "OK — PR 제목이 gitmoji 정책을 통과합니다."
