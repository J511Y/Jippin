# 집핀(Jippin) 시크릿 스캐너 CI — CMP-533 (Security Engineer)
#
# 책임:
#   PR / main push / 주간 스케줄에서 커밋된 시크릿을 자동 탐지.
#   pre-commit 훅(`.pre-commit-config.yaml`) 과 동일 패턴을 적용한다.
#
# 다층 방어 (job 3 개):
#   1) pattern-scan   — `tools/secret-scan/scan.py` (정본, allowlist 인식)
#   2) gitleaks       — industry-standard. `.gitleaks.toml` 룰 + 기본 룰
#   3) diff-grep      — PR 추가 라인만 grep 하는 최후 안전망
#
# 본 워크플로가 실패하면:
#   1) 해당 시크릿을 **즉시 회전** (`docs/runbooks/neon-credential-rotation.md` 등)
#   2) git history rewrite 또는 새 커밋으로 제거
#   3) PR 본문에 회전 사실 명시
name: secret-scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # 주간 1회 — 누락 탐지 (월요일 03:37 UTC = 한국 화 12:37).
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1) 집핀 자체 시크릿 스캐너 (정본)
  # ---------------------------------------------------------------------------
  pattern-scan:
    name: pattern scan (tools/secret-scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyYAML
        run: pip install --no-cache-dir "pyyaml>=6.0"

      - name: Self-test patterns (catches regex regressions)
        run: python tools/secret-scan/scan.py --selftest

      - name: Full-tree scan
        # 트래킹된 + ignore-되지 않은 untracked 모든 파일을 검사한다.
        run: |
          set -euo pipefail
          python tools/secret-scan/scan.py
          python tools/secret-scan/scan.py --json > secret-scan-report.json

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: secret-scan-report.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 2) gitleaks — 보조 스캐너 (industry standard, broad coverage)
  # `.gitleaks.toml` 가 patterns.yml 룰을 미러링한다.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  # ---------------------------------------------------------------------------
  # 3) Diff grep — 최후 안전망 (위 두 job 이 모두 실패해도 잡힘)
  # PR diff 의 추가 라인만 빠르게 grep.
  # ---------------------------------------------------------------------------
  diff-grep:
    name: diff grep (last-resort)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Grep diff for known secret prefixes
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # diff 에 추가된 라인만 검사. Removed lines 는 history 가 더럽지만 추가는 신규 누출.
          ADDED=$(git diff --unified=0 "${BASE}...${HEAD}" -- . \
            ':(exclude).env.example' \
            ':(exclude)docs/' \
            ':(exclude).github/workflows/secret-scan.yml' \
            ':(exclude)tools/secret-scan/' \
            ':(exclude).gitleaks.toml' \
            | grep -E '^\+' \
            | grep -Ev '^\+\+\+' || true)
          fail=0
          declare -A PATTERNS=(
            [neon]='npg_[A-Za-z0-9_]{8,}'
            [openai]='sk-(proj-|svcacct-|admin-)?[A-Za-z0-9_-]{20,}'
            [aws]='AKIA[0-9A-Z]{16}'
            [slack]='xox[baprs]-[A-Za-z0-9-]{10,}'
            [github]='gh[opusr]_[A-Za-z0-9]{20,}'
            [pem]='-----BEGIN [A-Z ]*PRIVATE KEY-----'
          )
          for name in "${!PATTERNS[@]}"; do
            pat="${PATTERNS[$name]}"
            if echo "$ADDED" | grep -E "$pat" > /tmp/hit 2>/dev/null; then
              echo "::error::[${name}] 시크릿 추정 패턴이 추가됨. 즉시 회전하고 커밋에서 제거."
              # 값 자체는 로그에 출력하지 않는다 (이중 노출 방지).
              echo "::error::매칭 위치(파일/줄)는 pattern-scan / gitleaks job 출력 참조."
              fail=1
            fi
          done
          exit "$fail"

  # ---------------------------------------------------------------------------
  # 4) 메타 게이트 — 위 모든 job 통과 시에만 성공.
  # 브랜치 보호 규칙은 본 job 한 개만 required 로 설정하면 충분.
  # ---------------------------------------------------------------------------
  secret-scan-status:
    name: secret-scan-status
    runs-on: ubuntu-latest
    needs:
      - pattern-scan
      - gitleaks
      - diff-grep
    if: always()
    steps:
      - name: Aggregate
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for r in \
            "${{ needs.pattern-scan.result }}" \
            "${{ needs.gitleaks.result }}" \
            "${{ needs.diff-grep.result }}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::sub-job failed/cancelled: $r"
              fail=1
            fi
          done
          exit "$fail"
