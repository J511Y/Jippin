# 집핀(Jippin) Supabase integration status wrapper — CMP-603.
#
# 책임 (정본: docs/runbooks/supabase-branching.md §6.3):
#   `supabase/**` 변경이 없는 PR 에서 Supabase Automatic Branching 의 preview
#   check 가 등록되지 않아 발생하는 required-check deadlock 을 회피한다. 동시에
#   `supabase/**` 변경이 있는 PR 에서는 실제 Supabase integration check 의
#   성공 / 실패를 ::warning:: 어노테이션으로 그대로 노출한다.
#
# 정책 (운영자 결정 2026-06-30): 본 잡은 **informational(머지 비차단)** 이다.
#   Supabase 측 preview/migration 은 브랜치 프로비저닝 실패(예: storage config 404)
#   등 플랫폼 사정으로 red 가 될 수 있고, 그것이 코드 머지를 막아선 안 된다. 따라서
#   타임아웃 / Supabase check 실패 / 설정 미비를 **hard-fail 하지 않고 ::warning:: 으로
#   surface 한 뒤 통과**시킨다 — 실패 사실은 어노테이션으로 보이되 required-check 를
#   초록으로 유지해 병합을 막지 않는다. (이전엔 hard-fail 로 머지를 차단했었다.)
#
# 동작:
#   1. PR diff 에 `supabase/**` 가 포함됐는지 확인. diff 범위는 **PR merge-base 기준**
#      (`git merge-base base.sha head.sha` ↔ head). 두 점 직접 비교 (`base..head`) 를
#      쓰면 base 브랜치가 PR 생성 이후 앞서간 경우 base-only 변경이 diff 에 섞여 false
#      positive 가 나고, 본 wrapper 는 Supabase check 를 영원히 기다리며 PR 이 deadlock /
#      false fail 한다. Added / Copied / Deleted / Modified / Renamed 모두 잡는다 (삭제
#      도 Supabase integration validation 대상 — migration 삭제 / config 삭제 포함).
#   2. 변경 없음 → wrapper 가 자체 succeed (skip 의미). path-filter deadlock 회피.
#   3. 변경 있음 → repository variable `SUPABASE_INTEGRATION_CHECK_NAME` 이 가리키는
#      Supabase 측 check context 를 polling. 결과를 그대로 wrapper 의 결과로 반영.
#      변수가 비어 있으면 명시적으로 실패 (콘솔 연결 미완료 — 정본 §6.3.1).
#
# Branch protection 등록 (사용자 작업, PR 머지 후):
#   GitHub Settings → Branches → `dev` / `main` 보호 규칙의 required checks 에
#   `supabase-status` 를 추가한다. 자세한 절차는 CMP-603 PR 본문 §사용자 작업 체크리스트.
#
# 시크릿 누출 가드 (정본: docs/runbooks/supabase-branching.md §7.3):
#   본 워크플로우는 check-run 의 status / conclusion 외 메타데이터를 로그에 출력하지
#   않는다. Supabase integration 이 PR 코멘트에 connection string 을 게시하는 옵션이
#   있다면 콘솔에서 OFF 로 두는 것이 §3.1 U4 의 봉인이다 — wrapper 가 본 옵션을 대체하지 않는다.
name: supabase-status

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  checks: read
  pull-requests: read
  statuses: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase-status:
    name: supabase-status
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect supabase/** change
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          # PR-owned diff 만 검사한다. base.sha ↔ head.sha 직접 비교는 base 가 PR
          # 생성 이후 앞서간 경우 base-only 변경이 섞여 wrapper 가 무관한 PR 의
          # Supabase check 를 영원히 기다리는 deadlock / false fail 을 만든다.
          # 따라서 merge-base 를 분기점으로 잡고 그 점에서 head 까지만 diff 한다.
          if ! merge_base=$(git merge-base "${base_sha}" "${head_sha}"); then
            echo "::warning::merge-base 산출 실패 — base.sha 로 fallback."
            merge_base="${base_sha}"
          fi
          # supabase/** 변경 감지는 Added / Copied / Deleted / Modified / Renamed 모두
          # 포함한다. migration 파일 삭제, config 삭제, schema 파일 삭제도 Supabase
          # integration validation 대상이므로 wrapper 가 Supabase check 결과를 본다.
          if git diff --name-only --diff-filter=ACDMR "${merge_base}" "${head_sha}" -- 'supabase/**' | grep -Eq '^supabase/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::supabase/** 변경 감지 (ACDMR) — Supabase integration check 결과를 polling 한다. merge_base=${merge_base}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::supabase/** 변경 없음 (merge-base 기준) — Supabase Automatic Branching trigger 대상이 아니므로 wrapper 자체 통과."
          fi

      - name: No-op (path-filter deadlock 회피)
        if: steps.detect.outputs.changed == 'false'
        run: echo "ok"

      - name: Validate SUPABASE_INTEGRATION_CHECK_NAME variable
        id: configured
        if: steps.detect.outputs.changed == 'true'
        env:
          NAME: ${{ vars.SUPABASE_INTEGRATION_CHECK_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${NAME:-}" ]]; then
            echo "::warning::repository variable SUPABASE_INTEGRATION_CHECK_NAME 미설정 — Supabase 결과를 polling 하지 않고 통과(informational, 머지 비차단)."
            echo "::warning::설정 절차(선택): Supabase Console → GitHub Integration 연결 후 첫 PR 에 나타나는 Supabase 측 check context 이름을 Settings → Variables → Actions 에 등록. 정본: docs/runbooks/supabase-branching.md §6.3.1."
            echo "name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # check name 자체는 비밀이 아니므로 출력해도 안전.
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "::notice::polling target check name: ${NAME}"

      - name: Poll Supabase integration check
        if: steps.detect.outputs.changed == 'true' && steps.configured.outputs.name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.event.pull_request.head.sha }}
          NAME: ${{ steps.configured.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          # job timeout (20분) 보다 살짝 짧게 끝나도록 17분 deadline.
          deadline=$(( $(date +%s) + 17 * 60 ))
          attempt=0
          while :; do
            attempt=$((attempt + 1))
            now=$(date +%s)
            if (( now > deadline )); then
              echo "::warning::Supabase integration check '${NAME}' 가 17분 내에 완료되지 않았습니다 — informational, 머지 비차단으로 통과."
              exit 0
            fi
            # check-runs API. check_name 으로 정확히 매칭 + 가장 최근 1건만.
            # output 의 summary/text 는 connection string 노출 가능성이 있어 일부러 보지 않는다 (§7.3).
            payload=$(gh api --method GET -H "Accept: application/vnd.github+json" \
              "repos/${OWNER}/${REPO}/commits/${SHA}/check-runs" \
              -f check_name="${NAME}" \
              -f per_page=1 2>/dev/null || echo '{"total_count":0,"check_runs":[]}')
            count=$(echo "${payload}" | jq -r '.total_count // 0')
            if [[ "${count}" -eq 0 ]]; then
              echo "[${attempt}] check '${NAME}' 아직 등록 안 됨 — 30초 후 재시도"
              sleep 30
              continue
            fi
            status=$(echo "${payload}" | jq -r '.check_runs[0].status // empty')
            conclusion=$(echo "${payload}" | jq -r '.check_runs[0].conclusion // empty')
            echo "[${attempt}] status=${status} conclusion=${conclusion:-<pending>}"
            if [[ "${status}" == "completed" ]]; then
              case "${conclusion}" in
                success|skipped|neutral)
                  echo "::notice::Supabase integration check '${NAME}' 통과: ${conclusion}"
                  exit 0
                  ;;
                *)
                  echo "::warning::Supabase integration check '${NAME}' 결과: ${conclusion} — informational, 머지 비차단으로 통과(플랫폼/프로비저닝 실패가 코드 머지를 막지 않도록)."
                  exit 0
                  ;;
              esac
            fi
            sleep 30
          done
