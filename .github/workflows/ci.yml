# 집핀(Jippin) CI 스켈레톤 — CMP-531 / D5 (+ CMP-539 migrate-check)
#
# 책임 (이슈 §3 산출물의 8개 잡 중 secret-scan 제외 7개 + CMP-539 추가):
#   1. `gitmoji-validate`  — PR 의 모든 커밋이 gitmoji 정규식(AGENTS.md §4.1) 통과
#   2. `web`               — apps/web (Next.js 16.2 / pnpm 9) typecheck + lint
#   3. `api`               — apps/api (FastAPI 0.115 / Python 3.13 / uv) ruff check + format check
#   4. `typecheck-api`     — apps/api mypy 스켈레톤 (의존성 추가 시 자동 활성화)
#   5. `test-web`          — apps/web pnpm test 스켈레톤 (script 추가 시 자동 활성화)
#   6. `test-api`          — apps/api uv run pytest 스켈레톤 (의존성 추가 시 자동 활성화)
#   7. `migrate-check`     — CMP-603: Supabase SQL migration drift 가드. `apps/api/src/models/**` 변경 PR 이
#                            `supabase/migrations/*.sql` 동행 없이 머지되는 사고를 차단한다.
#                            **Neon / Alembic 의존 없음** — Supabase Automatic Branching 이 forward DB
#                            migration 적용 책임이고 본 잡은 static diff 가드. 정본:
#                            docs/runbooks/supabase-branching.md §6.3.2.
#   8. `ci-status`         — 메타 게이트. 브랜치 보호의 required check 는 본 잡 1개로 충분.
#
# 의도적으로 빠진 것 (CMP-531 범위 외):
#   - 실제 테스트 본체 (PyTest / Playwright) — `test-web` / `test-api` 잡은 스켈레톤만
#     (이슈 §3 "실제 액션은 스켈레톤" + AGENTS.md §4.4 도구 부재 시 후속 이슈로 분리)
#   - mypy 본체 — `typecheck-api` 잡은 스켈레톤만 (apps/api 가 mypy 의존 추가 시 활성화)
#   - 빌드 산출물 업로드 / 배포                       → D6 이후
#   - 시크릿 스캔                                    → CMP-533 (Security) 의 secret-scan.yml 정본
#
# ADR-0001 §9 봉인: Node 22 / Python 3.13 / pnpm 9 / uv 0.5+
name: ci

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch: {}

# 동일 PR 의 직전 실행은 취소(빠른 피드백).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"
  PNPM_VERSION: "9.12.0"
  UV_VERSION: "0.5.11"

jobs:
  # -------------------------------------------------------------------
  # 1) gitmoji 커밋 메시지 검증
  # -------------------------------------------------------------------
  gitmoji-validate:
    name: gitmoji commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for range check)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate commit messages
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "Validating commits in ${BASE}..${HEAD}"
            python tooling/validate_commit_msg.py --range "${BASE}..${HEAD}"
          else
            # push to main / workflow_dispatch — 최근 1건만 검증
            HEAD="${{ github.sha }}"
            echo "Validating HEAD commit ${HEAD}"
            git log -1 --format=%s "${HEAD}" | python tooling/validate_commit_msg.py --stdin
          fi

  # -------------------------------------------------------------------
  # 2) apps/web — Next.js 16.2 / pnpm 9 (typecheck + lint)
  # -------------------------------------------------------------------
  web:
    name: web (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Detect apps/web
        id: detect
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ -f apps/web/package.json ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web/package.json 없음 — 본 job 은 no-op."
          fi

      - name: Setup pnpm
        if: steps.detect.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node ${{ env.NODE_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: pnpm install (frozen if lock present)
        if: steps.detect.outputs.exists == 'true'
        shell: bash
        run: |
          if [[ -f pnpm-lock.yaml ]]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml 미존재. 초기 부트스트랩 단계로 간주하고 lock 없이 설치한다."
            pnpm install --no-frozen-lockfile
          fi

      - name: Typecheck (tsc --noEmit)
        if: steps.detect.outputs.exists == 'true'
        run: pnpm run typecheck

      - name: Lint (next lint / eslint)
        if: steps.detect.outputs.exists == 'true'
        run: pnpm run lint

  # -------------------------------------------------------------------
  # 3) apps/api — FastAPI 0.115 / Python 3.13 / uv (ruff)
  # -------------------------------------------------------------------
  api:
    name: api (ruff check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Detect apps/api
        id: detect
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ -f apps/api/pyproject.toml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api/pyproject.toml 없음 — 본 job 은 no-op."
          fi

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv ${{ env.UV_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            apps/api/uv.lock
            apps/api/pyproject.toml

      - name: uv sync
        if: steps.detect.outputs.exists == 'true'
        shell: bash
        run: |
          if [[ -f uv.lock ]]; then
            uv sync --frozen
          else
            echo "::warning::apps/api/uv.lock 미존재. 초기 부트스트랩 단계로 간주."
            uv sync
          fi

      - name: Ruff check
        if: steps.detect.outputs.exists == 'true'
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.detect.outputs.exists == 'true'
        run: uv run ruff format --check .

  # -------------------------------------------------------------------
  # 4) apps/api — typecheck (mypy) 스켈레톤.
  # 이슈 §3 산출물의 `typecheck-api` 잡. mypy 가 apps/api/pyproject.toml 의 dev 의존성에
  # 추가되면 `uv run mypy .` 단계를 활성화한다. 그 전까지는 잡 구조만 유지.
  # -------------------------------------------------------------------
  typecheck-api:
    name: api (mypy — stub)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Detect mypy in pyproject
        id: detect
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ -f apps/api/pyproject.toml ]] && grep -q '^mypy' apps/api/pyproject.toml 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api/pyproject.toml 에 mypy 미설정 — 본 job 은 stub (TODO: hook real linter)."
          fi

      - name: TODO — uv run mypy .
        if: steps.detect.outputs.exists == 'false'
        run: 'echo "TODO: hook real linter (mypy)"'

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv ${{ env.UV_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: uv sync
        if: steps.detect.outputs.exists == 'true'
        run: uv sync

      - name: mypy
        if: steps.detect.outputs.exists == 'true'
        run: uv run mypy .

  # -------------------------------------------------------------------
  # 5) apps/web — test 스켈레톤.
  # 이슈 §3 산출물의 `test-web` 잡. apps/web/package.json 에 `test` 스크립트가
  # 추가되면 실제 실행되고, 그 전까지는 stub.
  # -------------------------------------------------------------------
  test-web:
    name: web (test — stub)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Detect web test script
        id: detect
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ -f apps/web/package.json ]] && grep -q '"test"' apps/web/package.json 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web/package.json 에 test 스크립트 미정의 — 본 job 은 stub (TODO: hook real test runner)."
          fi

      - name: TODO — pnpm -C apps/web test
        if: steps.detect.outputs.exists == 'false'
        run: 'echo "TODO: hook real test runner (vitest/jest/playwright)"'

      - name: Setup pnpm
        if: steps.detect.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node ${{ env.NODE_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: pnpm install
        if: steps.detect.outputs.exists == 'true'
        shell: bash
        run: |
          if [[ -f pnpm-lock.yaml ]]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: pnpm test
        if: steps.detect.outputs.exists == 'true'
        run: pnpm test

  # -------------------------------------------------------------------
  # 6) apps/api — test 스켈레톤.
  # 이슈 §3 산출물의 `test-api` 잡. apps/api/pyproject.toml 의 dev 의존성에 pytest 가
  # 추가되면 실제 실행되고, 그 전까지는 stub.
  # -------------------------------------------------------------------
  test-api:
    name: api (test — stub)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Detect pytest in pyproject
        id: detect
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ -f apps/api/pyproject.toml ]] && grep -Eq "(^|[[:space:]\"'])pytest([<>=~!,[:space:]\"']|$)" apps/api/pyproject.toml 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api/pyproject.toml 에 pytest 미설정 — 본 job 은 stub (TODO: hook real test runner)."
          fi

      - name: TODO — uv run pytest
        if: steps.detect.outputs.exists == 'false'
        run: 'echo "TODO: hook real test runner (pytest)"'

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv ${{ env.UV_VERSION }}
        if: steps.detect.outputs.exists == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: uv sync
        if: steps.detect.outputs.exists == 'true'
        run: uv sync

      - name: pytest
        if: steps.detect.outputs.exists == 'true'
        run: uv run pytest

  # -------------------------------------------------------------------
  # 7) Supabase SQL migration drift 가드 (CMP-603).
  #
  # 책임: `apps/api/src/models/**/*.py` (SQLAlchemy 모델) 만 바뀌고
  # `supabase/migrations/*.sql` 이 동행하지 않은 PR 을 차단한다.
  #
  # 왜 static 가드인가:
  #   Supabase Automatic Branching 이 forward DB migration 을 적용하지만,
  #   SQL 파일이 빠진 모델-only PR 은 preview branch 에 적용할 SQL 자체가 없어
  #   preview check 가 통과한 채 dev/main 에 머지된다. 그러면 `dev`/`main` push
  #   시 Supabase 가 development/production DB 에 schema 변경을 누락한다.
  #   본 잡은 그 미반영 사고를 PR 단계에서 잡는다.
  #
  # 정본 정의: docs/runbooks/supabase-branching.md §6.3.2 (Supabase SQL
  # migration drift guard — model-only PR 가드).
  #
  # Neon / Alembic 의존 없음:
  #   이전 (CMP-539) 의 `NEON_TEST_DATABASE_URL` + `alembic upgrade head` +
  #   `alembic check` 흐름은 cutover (CMP-603) 시점에 제거. Alembic 자체는
  #   historical reference 로만 보존되며 forward authority 가 아니다
  #   (docs/runbooks/supabase-migration-plan.md §Alembic Keep/Remove).
  # -------------------------------------------------------------------
  migrate-check:
    name: api (supabase migration drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # base..head 비교를 위해 PR 양 끝 SHA 가 필요.
          fetch-depth: 0

      - name: Detect model vs SQL migration drift
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "::notice::pull_request 이벤트가 아니므로 drift 가드 skip."
            exit 0
          fi
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          # PR-owned diff 만 검사하기 위해 merge-base 기준으로 비교한다.
          # base.sha 와 head.sha 를 직접 두 점으로 비교하면 base 브랜치가 PR 생성
          # 이후 앞서간 경우 base-only 변경이 diff 에 섞여 무관한 PR 이 fail 한다.
          # 따라서 `git merge-base` 로 분기점을 찾고 그 점에서 head 까지만 본다
          # (= triple-dot `base...head` 의미).
          if ! merge_base=$(git merge-base "${base_sha}" "${head_sha}"); then
            echo "::warning::merge-base 산출 실패 — base.sha 로 fallback (base 가 PR 이후 변경되지 않은 경우 의미 동일)."
            merge_base="${base_sha}"
          fi
          echo "::notice::diff range merge_base=${merge_base} head=${head_sha}"

          # Model 변경 감지: Added / Copied / Deleted / Modified / Renamed 모두 schema-impacting.
          # 특히 모델 파일 삭제 (D) 도 테이블 제거를 의미할 수 있으므로 반드시 포함한다.
          model_lines=$(git diff --name-status --diff-filter=ACDMR "${merge_base}" "${head_sha}" -- 'apps/api/src/models/**/*.py' || true)

          # SQL migration 동행 변경 감지: Added / Modified / Renamed 만 — 마이그레이션 파일 삭제는
          # "새 forward migration 추가" 신호가 아니므로 sql_added 로 인정하지 않는다.
          # (테이블 DROP 이 필요한 경우 새 DROP TABLE 마이그레이션 SQL 을 추가해야 하며, 그것은
          # 본 가드에서 Added 로 잡힌다 — 즉 SQL 삭제로 SQL 추가를 대체할 수 없다.)
          sql_lines=$(git diff --name-only --diff-filter=AMR "${merge_base}" "${head_sha}" -- 'supabase/migrations/**/*.sql' || true)

          model_changed="false"
          sql_added="false"
          if [[ -n "${model_lines}" ]]; then
            model_changed="true"
          fi
          if [[ -n "${sql_lines}" ]]; then
            sql_added="true"
          fi

          if [[ "${model_changed}" == "true" && "${sql_added}" != "true" ]]; then
            echo "::error::SQLAlchemy 모델이 변경되었으나 supabase/migrations/*.sql 동행 변경이 없습니다."
            echo "::error::본 PR 의 모델 변경 (status path — D=Deleted 포함):"
            echo "${model_lines}" | sed 's/^/  - /'
            echo "::error::DB schema SSOT 는 supabase/migrations/*.sql 입니다 (docs/runbooks/supabase-branching.md §6.3.2)."
            echo "::error::조치: 같은 PR 에 새 supabase/migrations/<timestamp>_<name>.sql 을 추가하거나 (테이블 삭제도 DROP TABLE 마이그레이션이 필요), 모델 변경이 schema-impacting 이 아니면 PR 본문에 명시적으로 사유를 적어주세요."
            exit 1
          fi
          if [[ "${model_changed}" == "true" && "${sql_added}" == "true" ]]; then
            echo "::notice::모델 + SQL migration 동행 변경 — drift 없음."
          elif [[ "${model_changed}" != "true" ]]; then
            echo "::notice::SQLAlchemy 모델 변경 없음 — drift 가드 통과."
          fi

  # -------------------------------------------------------------------
  # 8) 메타 게이트 — 위 모든 job 통과 시에만 성공.
  # 브랜치 보호 규칙은 본 job 한 개만 required 로 설정하면 충분.
  # -------------------------------------------------------------------
  ci-status:
    name: ci-status
    runs-on: ubuntu-latest
    needs:
      - gitmoji-validate
      - web
      - api
      - typecheck-api
      - test-web
      - test-api
      - migrate-check
    if: always()
    steps:
      - name: Aggregate
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for r in \
            "${{ needs.gitmoji-validate.result }}" \
            "${{ needs.web.result }}" \
            "${{ needs.api.result }}" \
            "${{ needs.typecheck-api.result }}" \
            "${{ needs.test-web.result }}" \
            "${{ needs.test-api.result }}" \
            "${{ needs.migrate-check.result }}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::sub-job failed/cancelled: $r"
              fail=1
            fi
          done
          exit "$fail"
