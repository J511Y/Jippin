name: ✨ 기능 요청
description: 명세서·요구사항에 부합하는 신규 기능 제안.
title: "[Feature] <한 줄 요약>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        본 템플릿은 사람 개발자와 Paperclip 에이전트 모두를 위한 것이다.
        기능명세서·SDD·요구사항 위에서 동작해야 한다. 우선순위(P0/P1/P2/P3)도 함께 적어줘.

  - type: input
    id: cmp_parent
    attributes:
      label: 부모 Paperclip 이슈 (선택)
      placeholder: "CMP-###"

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위 (요구사항 명세서 §3.3)
      options:
        - P0 (MVP)
        - P1 (확장)
        - P2 (후속)
        - P3 (장기)
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 영향 모듈
      multiple: true
      options:
        - AUTH
        - INPUT
        - MASK
        - AI
        - OVERLAY
        - CHAT
        - FLOW_GUARD
        - RULE
        - REPORT
        - CONTRACTS
        - INFRA
        - DEVOPS
        - SECURITY
        - QA
        - META
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: 사용자 스토리
      placeholder: "사용자로서, ____ 하고 싶다 — 그 이유는 ____."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 수용 기준
      description: 측정 가능한 형태로. 명세 근거(FR-XX / NFR-XX) 인용 권장.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: contracts
    attributes:
      label: 컨트랙트 영향 (해당 시)
      description: |
        `CommonJudgmentSchema` / `CompletionDecision` / `RuleEvalResult` / `EstimateResult` 중
        영향이 있으면 `packages/contracts/schemas/*.schema.json` 의 변경 범위를 적어줘.

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 기각 사유
      description: 다른 접근을 고려했다면 왜 본 안을 택했는지.

  - type: checkboxes
    id: confirm
    attributes:
      label: 확인
      options:
        - label: 본 요청이 CEO 브리프 §2 (CMP-523 인도물 범위) 또는 후속 마일스톤(§9) 와 정합한다.
          required: true
        - label: 시크릿·도면 원본 등 민감 자료를 본 이슈에 포함하지 않았다.
          required: true
