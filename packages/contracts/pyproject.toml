[project]
name = "zippin-contracts"
version = "1.0.0"
description = "Jippin 공통 컨트랙트 — JSON Schema (정본) + 생성된 Pydantic v2 모델. SDD §5.1·§5.2 / ADR-0001 §9.2 봉인."
readme = "README.md"
requires-python = ">=3.13,<3.14"
authors = [{ name = "Jippin Architecture Lead" }]
dependencies = [
    "pydantic>=2.9,<3.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["python/zippin_contracts"]

[tool.hatch.build.targets.sdist]
include = [
    "python/zippin_contracts",
    "schemas",
    "README.md",
]

[dependency-groups]
dev = [
    "datamodel-code-generator>=0.28,<0.30",
]
