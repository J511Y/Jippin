# =============================================================================
# Alembic configuration (CMP-537 / parent: CMP-536)
# -----------------------------------------------------------------------------
# Sealed behavior:
#   - sqlalchemy.url MUST stay blank. migrations/env.py resolves the URL from
#     apps/api/src/config.py:Settings.database_url (non-pooler) only.
#   - file_template uses timestamp + rev + slug for sortable filenames.
#   - timezone = UTC for deterministic filenames across CI and hosts.
#   - post_write_hooks runs ruff format so generated revisions match repo style.
# References:
#   - ADR-0001 sec 3 (Python/uv), sec 4 (Neon pooler vs non-pooler split)
#   - AGENTS.md sec 4.4 (secrets / env vars)
# NOTE: this file is parsed by Python configparser, which on Windows defaults to
# CP949. Keep this file ASCII-only; Korean narrative belongs in README.md
# and module docstrings.
# =============================================================================

[alembic]
script_location = migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
sqlalchemy.url =
version_path_separator = os
truncate_slug_length = 40
output_encoding = utf-8

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

# -----------------------------------------------------------------------------
# Logging used by the Alembic CLI directly. Independent of app structlog.
# -----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
