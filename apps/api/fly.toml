# Fly.io — jippin api (FastAPI). ADR-0006 분리형 토폴로지 / docs/runbooks/fly-api-deploy.md.
# 도쿄(nrt) 단일 Machine. 추론은 HF Endpoint offload + 이미지는 presigned R2 URL →
# api 는 I/O 게이트웨이라 1 vCPU / 1GB 로 충분 (ADR-0006 §1).
app = "jippin"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000          # Dockerfile EXPOSE 8000 / gunicorn --bind 0.0.0.0:8000
  force_https = true
  auto_stop_machines = "off"    # OAuth 콜백 콜드스타트 방지 — 상시 가동
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 60

  # /healthz 는 항상 200 을 돌려주고 body.db.ok 로 DB 상태를 알린다 (healthz.py).
  # HTTP 레벨 체크라 프로세스 기동만 확인한다 — DB 실패는 로그/모니터링으로 본다.
  [[http_service.checks]]
    method = "get"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
